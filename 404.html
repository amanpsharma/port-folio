<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page not found · Aman Sharma</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230c0c0c'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='sans-serif' font-size='34' font-weight='700' fill='%23fff'%3EA%3C/text%3E%3Ccircle cx='50' cy='46' r='4' fill='%23f5c842'/%3E%3C/svg%3E"
    />
    <style>
      body {
        cursor: auto;
      }
      .nf-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
        gap: 20px;
      }
      .nf-code {
        font-family: "Unbounded", sans-serif;
        font-size: clamp(96px, 18vw, 220px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #0c0c0c 30%, #f5c842);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .nf-msg {
        font-size: 18px;
        color: #555;
        max-width: 480px;
      }
    </style>
  </head>
  <body>
    <main class="nf-wrap">
      <div class="nf-code">404</div>
      <h1 style="font-family: 'Unbounded', sans-serif; font-size: 28px">
        Page not found
      </h1>
      <p class="nf-msg">
        That URL doesn't exist on this site. Maybe you were looking for the
        homepage?
      </p>
      <a href="/" class="btn btn-dark">← Back home</a>
    </main>
  </body>
</html>
